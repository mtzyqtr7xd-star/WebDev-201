<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Hangman</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fdf6f9;
}

/* ===== NAVBAR ===== */
#mainNav {
    background-color: lightgrey;
    padding: 20px;
    position: fixed;
    top: 0;
    width: 100%;
}

#mainNav .container {
    display: flex;
    justify-content: flex-end;
}

.navbar-nav {
    list-style: none;
    display: flex;
    gap: 15px;
    margin: 0;
    padding: 0;
}

nav a {
    padding: 10px;
    color: #d63384;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    background-color: #75e4f0;
    border-radius: 5px;
}

/* ===== GAME ===== */
.game-container {
    text-align: center;
    margin-top: 120px;
}

h1 {
    color: #d63384;
}

#jokeBox {
    margin: 20px auto;
    padding: 15px;
    max-width: 500px;
    background: white;
    border-radius: 10px;
}

/* Word display */
#wordDisplay {
    font-size: 28px;
    letter-spacing: 8px;
    margin: 20px;
}

/* Alphabet buttons */
#alphabet {
    max-width: 600px;
    margin: auto;
}

.letter-btn {
    margin: 4px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #d63384;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.letter-btn:hover {
    background: #75e4f0;
}

.letter-btn:disabled {
    background: lightgray;
    color: #555;
}

/* Buttons */
button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #d63384;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #75e4f0;
}

canvas {
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav id="mainNav">
    <div class="container">
        <ul class="navbar-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="fromScratch.html">Wedding Pictures</a></li>
            <li><a href="game.html">Wedding Jokes</a></li>
        </ul>
    </div>
</nav>

<!-- GAME -->
<div class="game-container">
    <h1>💍 Wedding Hangman</h1>
    <p>Guess the missing word from the joke!</p>

    <div id="jokeBox">Click "New Game"</div>

    <canvas id="canvas" width="200" height="200"></canvas>

    <div id="wordDisplay"></div>

    <div id="alphabet"></div>

    <br>

    <input type="text" id="wordGuess" placeholder="Guess full word">
    <button onclick="guessWord()">Guess Word</button>

    <p id="feedback"></p>

    <button onclick="startGame()">New Game</button>
</div>

<script>
const jokes = [
{
    text: "Marriage is finding that one special person to _____ for a lifetime.",
    answer: "annoy"
},
{
    text: "Why did the cake go to therapy? Too many _____ of emotion!",
    answer: "layers"
},
{
    text: "Marriage: when dating goes ____.",
    answer: "pro"
}
];

let answer = "";
let display = [];
let wrong = 0;
const maxWrong = 6;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function startGame() {
    const random = jokes[Math.floor(Math.random() * jokes.length)];

    answer = random.answer.toLowerCase();
    display = Array(answer.length).fill("_");
    wrong = 0;

    document.getElementById("jokeBox").textContent = random.text;
    document.getElementById("wordDisplay").textContent = display.join(" ");
    document.getElementById("feedback").textContent = "";

    draw();
    createAlphabet();
}

function createAlphabet() {
    const div = document.getElementById("alphabet");
    div.innerHTML = "";

    for (let i = 65; i <= 90; i++) {
        let letter = String.fromCharCode(i);

        let btn = document.createElement("button");
        btn.textContent = letter;
        btn.className = "letter-btn";

        btn.onclick = () => {
            btn.disabled = true;
            guessLetter(letter.toLowerCase());
        };

        div.appendChild(btn);
    }
}

function guessLetter(letter) {
    let correct = false;

    for (let i = 0; i < answer.length; i++) {
        if (answer[i] === letter) {
            display[i] = letter;
            correct = true;
        }
    }

    if (!correct) {
        wrong++;
        draw();
    }

    update();
}

function guessWord() {
    const guess = document.getElementById("wordGuess").value.toLowerCase();

    if (guess === answer) {
        display = answer.split("");
        endGame("🎉 Correct!");
    } else {
        wrong++;
        draw();
        update();
    }

    document.getElementById("wordGuess").value = "";
}

function update() {
    document.getElementById("wordDisplay").textContent = display.join(" ");

    if (!display.includes("_")) {
        endGame("🎉 You Win!");
    }

    if (wrong >= maxWrong) {
        endGame("💀 Game Over! Answer: " + answer);
    }
}

function endGame(message) {
    document.getElementById("feedback").textContent = message;
    document.getElementById("wordDisplay").textContent = answer;

    document.querySelectorAll(".letter-btn").forEach(b => b.disabled = true);
}

/* DRAW HANGMAN */
function draw() {
    ctx.clearRect(0, 0, 200, 200);

    // base
    ctx.beginPath();
    ctx.moveTo(10, 180);
    ctx.lineTo(150, 180);
    ctx.stroke();

    if (wrong > 0) {
        ctx.moveTo(30,180);
        ctx.lineTo(30,20);
        ctx.lineTo(100,20);
        ctx.lineTo(100,40);
        ctx.stroke();
    }

    if (wrong > 1) {
        ctx.beginPath();
        ctx.arc(100,55,15,0,Math.PI*2);
        ctx.stroke();
    }

    if (wrong > 2) {
        ctx.beginPath();
        ctx.moveTo(100,70);
        ctx.lineTo(100,120);
        ctx.stroke();
    }

    if (wrong > 3) {
        ctx.beginPath();
        ctx.moveTo(100,80);
        ctx.lineTo(80,100);
        ctx.stroke();
    }

    if (wrong > 4) {
        ctx.beginPath();
        ctx.moveTo(100,80);
        ctx.lineTo(120,100);
        ctx.stroke();
    }

    if (wrong > 5) {
        ctx.beginPath();
        ctx.moveTo(100,120);
        ctx.lineTo(80,150);
        ctx.moveTo(100,120);
        ctx.lineTo(120,150);
        ctx.stroke();
    }
}
</script>

</body>
</html>
